name: Snipit
options:
  bundleIdPrefix: io.github.madeye
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Snipit:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Snipit
    entitlements:
      path: Snipit/Resources/Snipit.entitlements
      properties:
        com.apple.security.screen-recording: true
    dependencies:
      - framework: Carbon.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.madeye.snipit
        DEVELOPMENT_TEAM: SK4GFF6AHN
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        INFOPLIST_FILE: Snipit/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Snipit/Resources/Snipit.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
